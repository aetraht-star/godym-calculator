<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godym Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1e1e1e; }
        .calculator { background: #2d2d2d; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; }
        .display-wrapper { background: #1e1e1e; border-radius: 10px; margin-bottom: 20px; padding: 15px 20px; min-height: 90px; }
        .expression { color: #888; font-size: 1.2rem; text-align: right; min-height: 25px; word-wrap: break-word; }
        .result { color: #fff; font-size: 2.5rem; text-align: right; min-height: 45px; word-wrap: break-word; }
        .result.preview { color: #666; } /* Grey colour preview tan */
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 1.2rem; border: none; border-radius: 10px; cursor: pointer; background: #3d3d3d; color: #fff; transition: 0.2s; }
        button:hover { background: #4d4d4d; }
        button:active { transform: scale(0.95); }
        .operator { background: #ff9500; }
        .operator:hover { background: #ffaa33; }
        .equals { background: #ff9500; grid-column: span 2; }
        .clear, .delete { background: #a5a5a5; color: #000; }
        .zero { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display-wrapper">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="delete" onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="handlePercentage()">%</button>
            <button class="operator" onclick="appendOperator('/')">/</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">−</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button class="zero" onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let expressionDisplay = document.getElementById('expression');
        let resultDisplay = document.getElementById('result');
        let currentExpression = '';
        let shouldReset = false;

        function updateDisplays() {
            expressionDisplay.textContent = currentExpression;
            calculatePreview();
        }

        function appendNumber(number) {
            if (shouldReset) {
                currentExpression = '';
                shouldReset = false;
            }
            currentExpression += number;
            updateDisplays();
        }

        function appendOperator(operator) {
            if (shouldReset) shouldReset = false;
            const lastChar = currentExpression.slice(-1);
            if ('+-*/'.includes(lastChar)) {
                currentExpression = currentExpression.slice(0, -1) + operator;
            } else if (currentExpression !== '') {
                currentExpression += operator;
            }
            updateDisplays();
        }

        function handlePercentage() {
            if (currentExpression === '') return;
            
            // 200+10% = 200 + 200*0.1 = 220 tih ang kha
            const match = currentExpression.match(/(\d+\.?\d*)([+\-*/])(\d+\.?\d*)$/);
            if (match) {
                const base = parseFloat(match[1]);
                const operator = match[2];
                const percentValue = parseFloat(match[3]);
                const calculatedPercent = base * (percentValue / 100);
                currentExpression = currentExpression.replace(/(\d+\.?\d*)$/, calculatedPercent);
            } else {
                // 50% = 0.5 ringawt
                const lastNumber = currentExpression.match(/(\d+\.?\d*)$/);
                if (lastNumber) {
                    const num = parseFloat(lastNumber[0]) / 100;
                    currentExpression = currentExpression.replace(/(\d+\.?\d*)$/, num);
                }
            }
            updateDisplays();
        }

        function clearDisplay() {
            currentExpression = '';
            expressionDisplay.textContent = '';
            resultDisplay.textContent = '0';
            resultDisplay.classList.remove('preview');
            shouldReset = false;
        }

        function deleteLast() {
            currentExpression = currentExpression.slice(0, -1);
            updateDisplays();
        }

        function calculatePreview() {
            if (currentExpression === '') {
                resultDisplay.textContent = '0';
                resultDisplay.classList.remove('preview');
                return;
            }
            
            try {
                let evalExpression = currentExpression.replace(/×/g, '*').replace(/−/g, '-');
                // Last character operator a nih chuan preview lo
                if ('+-*/'.includes(evalExpression.slice(-1))) {
                    resultDisplay.textContent = '';
                    return;
                }
                let result = eval(evalExpression);
                if (isFinite(result)) {
                    resultDisplay.textContent = parseFloat(result.toFixed(10));
                    resultDisplay.classList.add('preview'); // Grey colour
                }
            } catch (error) {
                resultDisplay.textContent = '';
            }
        }

        function calculate() {
            try {
                let evalExpression = currentExpression.replace(/×/g, '*').replace(/−/g, '-');
                let result = eval(evalExpression);
                if (isFinite(result)) {
                    expressionDisplay.textContent = currentExpression + '=';
                    resultDisplay.textContent = parseFloat(result.toFixed(10));
                    resultDisplay.classList.remove('preview'); // White colour
                    currentExpression = String(parseFloat(result.toFixed(10)));
                    shouldReset = true;
                } else {
                    resultDisplay.textContent = 'Error';
                }
            } catch (error) {
                resultDisplay.textContent = 'Error';
                setTimeout(clearDisplay, 1000);
            }
        }
    </script>
</body>
</html>
